<script>
const { createApp, ref, reactive, onMounted, computed, watch, nextTick } = Vue;

const runGas = (funcName, ...args) => {
    return new Promise((resolve, reject) => {
        if (typeof google === 'undefined') { 
            reject(new Error("ไม่พบ Google API")); 
            return; 
        }
        google.script.run
            .withSuccessHandler(res => res ? resolve(res) : reject(new Error("No response")))
            .withFailureHandler(err => reject(err))
            [funcName](...args);
    });
};

const app = createApp({
    setup() {
        // --- Core States ---
        const page = ref('login'); 
        const loginStep = ref(1);
        const otpInput = ref('');
        const otpMessage = ref('');
        const otpCooldown = ref(0); 
        let otpTimerInterval = null;
        
        // UPDATE VERSION 
        const appVersion = "v1.3.7 AI Core"; 
        
        // --- Security / Lock Screen ---
        const isLocked = ref(false);
        const lockPassword = ref('');
        const lockError = ref('');
        let afkTimeout = null;
        let sessionCheckInterval = null;

        // --- Theme ---
        const theme = ref('light'); 
        
        const isLoading = ref(false);
        const isDataLoading = ref(false);
        const isSpinning = ref(false);
        const isEditMode = ref(false);
        const viewMode = ref(false); 
        const isSidebarOpen = ref(true); 
        const isDashboardTopOpen = ref(true); 
        
        const showSettingsModal = ref(false);
        const showProfileModal = ref(false);
        
        // --- MPI / HISTORY STATES (NEW v1.3.7) ---
        const showHistoryModal = ref(false);
        const isHistoryLoading = ref(false);
        const isHistoryPreloading = ref(false);
        const patientHistoryData = ref([]);
        const historySearchCid = ref('');
        const selectedHistoricalReport = ref('current');
        const isViewingHistory = ref(false);
        const currentReportOriginalData = ref(null); // ใช้ ref เพื่อให้ Vue อัปเดต UI ทันที (แก้บัค Dropdown โล่ง)

        const user = reactive({ 
            name: '', 
            position: '', 
            role: '', 
            username: '', 
            image: '' 
        });

        const systemConfig = reactive({ 
            logoUrl: 'https://drive.google.com/thumbnail?id=142CkRafzFxGXtCS5q5D0Iqct7rKr4HSA&sz=w200' 
        });
        
        const config = reactive({ years: [], selectedYear: '' });
        const formLogin = reactive({ username: '', password: '' });

        const stats = reactive({ total: 0, reported: 0, abnormal: 0 });
        const patients = ref([]);
        
        // --- Master Data ---
        const masterUnits = ref([]);
        const masterDistricts = ref([]);
        const masterAdequacy = ref([]);
        const masterCytoTechs = ref([]);
        const masterPathos = ref([]);
        
        const masterSquamous = ref([]);
        const masterGlandular = ref([]);
        const masterCat300 = ref([]); 

        const prefixesData = ref([]); 
        const prefixes = computed(() => prefixesData.value.map(p => p.prefix));
        
        const masterContras = ref([]);
        const masterPrevTx = ref([]);
        const masterOrganism = ref([]);
        const masterNonNeo = ref([]);
        
        const masterSpecimenType = ref([]);
        const masterComment = ref([]);

        // --- Helper: Date Calculation for Defaults ---
        const getFirstDayOfMonth = () => {
            const date = new Date();
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-01`;
        };
        const getLastDayOfMonth = () => {
            const date = new Date();
            const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(lastDay.getDate()).padStart(2, '0')}`;
        };

        // --- Filter States ---
        const unitFilter = ref('All'); 
        const searchQuery = ref('');
        const statusFilter = ref('Pending'); 
        const dashDateStart = ref(getFirstDayOfMonth()); 
        const dashDateEnd = ref(getLastDayOfMonth()); 

        const formatDisplayDate = (dateStr) => {
            if (!dateStr || dateStr === '-') return '-';
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            return dateStr;
        };

        const defaultForm = {
            rowId: '', cytoNo: '', cytoNoPreview: '',
            hn: '', cid: '', prefix: '', fname: '', lname: '', age: '', sex: 'หญิง',
            specimenDate: '', receivedDate: '', 
            unit: '', district: '', hcode: '', coordinator: '', phone: '',
            para: '', last: '', lmp: '', contraception: '', 
            prevTx: '', lastPap: '', clinFind: '', 
            clinDx: '', method: '', registerName: ''
        };
        
        const formReg = reactive({ ...defaultForm });

        const ui = reactive({
            searchContra: '', showContraList: false, contraOtherText: '',
            showPrevTxList: false, prevTxSelections: [], prevTxOtherText: '',
            lmpType: 'ระบุวันที่', lmpDate: '',
            reportDateStart: getFirstDayOfMonth(), 
            reportDateEnd: getLastDayOfMonth(), 
            reportSearch: '',
            reportAdditionalOther: '',
            showPatientInfo: false,
            showOrganismList: false, 
            showNonNeoList: false,
            commentSelect: '',
            commentOtherText: ''
        });

        const formReport = reactive({ 
            rowId: '', cytoNo: '', patient: {}, 
            adequacy: '', adequacyDetail: '', additional: '',
            organismSelections: [], organismOtherText: '', 
            nonNeoSelections: [], 
            
            squamousMain: '',
            squamousSubSingle: '', 
            vainOption: '',        
            
            glandularMain: '',
            glandularSub: '',      

            cat300: '', comment: '',
            cytoName: '', cytoDate: '', cytoTime: '',
            hasPatho: false, pathoName: '', pathoDate: '', pathoTime: ''
        });

        // --- Watcher สำหรับอัปเดต Comment เรียลไทม์ ---
        watch([() => ui.commentSelect, () => ui.commentOtherText], ([sel, other]) => {
            if (sel === 'Other') {
                formReport.comment = 'Other : ' + other;
            } else {
                formReport.comment = sel;
            }
        });

        // --- Frontend Audit Logger ---
        const frontendLog = async (action, detail, username) => {
            try { await runGas('apiFrontendLog', action, detail, username || 'Unknown'); } catch(e){}
        };

        // --- Preferences System ---
        const PREFS_KEY = 'cytoPrefs_v99';
        const loadPrefs = () => {
            try {
                const prefsStr = localStorage.getItem(PREFS_KEY);
                if (prefsStr) {
                    const p = JSON.parse(prefsStr);
                    if (p.selectedYear && config.years.includes(p.selectedYear)) {
                        config.selectedYear = p.selectedYear;
                    } else {
                        const currentThaiYear = (new Date().getFullYear() + 543).toString();
                        if (config.years.includes(currentThaiYear)) config.selectedYear = currentThaiYear;
                    }
                    if (p.statusFilter) statusFilter.value = p.statusFilter;
                    if (p.dashDateStart !== undefined) dashDateStart.value = p.dashDateStart;
                    if (p.dashDateEnd !== undefined) dashDateEnd.value = p.dashDateEnd;
                    if (p.reportDateStart !== undefined) ui.reportDateStart = p.reportDateStart;
                    if (p.reportDateEnd !== undefined) ui.reportDateEnd = p.reportDateEnd;
                } else {
                    const currentThaiYear = (new Date().getFullYear() + 543).toString();
                    if (config.years.includes(currentThaiYear)) config.selectedYear = currentThaiYear;
                }
            } catch(e) {}
        };

        const savePrefs = () => {
            const p = {
                selectedYear: config.selectedYear,
                statusFilter: statusFilter.value,
                dashDateStart: dashDateStart.value,
                dashDateEnd: dashDateEnd.value,
                reportDateStart: ui.reportDateStart,
                reportDateEnd: ui.reportDateEnd
            };
            localStorage.setItem(PREFS_KEY, JSON.stringify(p));
        };

        watch([() => config.selectedYear, statusFilter, dashDateStart, dashDateEnd, () => ui.reportDateStart, () => ui.reportDateEnd], () => {
            if (page.value !== 'login') savePrefs();
        }, { deep: true });

        // --- Computed AI Smart Blur Condition Logic ---
        const hasData100 = computed(() => formReport.organismSelections.length > 0 || formReport.nonNeoSelections.length > 0 || !!formReport.organismOtherText || ui.showOrganismList || ui.showNonNeoList);
        const hasData200Sq = computed(() => !!formReport.squamousMain);
        const hasData200Gl = computed(() => !!formReport.glandularMain);
        const hasData300 = computed(() => !!formReport.cat300);
        const hasDataComment = computed(() => !!ui.commentSelect || !!ui.commentOtherText);

        const historicalOptions = computed(() => {
            if (!currentReportOriginalData.value) return [];
            return patientHistoryData.value.filter(x => x.cytoNo !== currentReportOriginalData.value.cytoNo && x.status === 'Reported');
        });

        watch(() => formReport.squamousMain, (newVal, oldVal) => {
             if(oldVal && newVal !== oldVal) {
                 formReport.squamousSubSingle = '';
                 formReport.vainOption = '';
             }
        });
        
        watch(() => formReport.squamousSubSingle, (newVal) => {
             if (newVal !== '241 SIL') {
                 formReport.vainOption = '';
             }
        });
        
        watch(() => formReport.glandularMain, (newVal, oldVal) => {
             if(oldVal && newVal !== oldVal) {
                 formReport.glandularSub = '';
             }
        });

        const changeTheme = (newTheme) => {
            theme.value = newTheme;
            document.documentElement.setAttribute('data-theme', newTheme);
            const savedStr = localStorage.getItem('cytoUser_v99');
            if (savedStr) {
                try {
                    const saved = JSON.parse(savedStr);
                    saved.theme = newTheme;
                    localStorage.setItem('cytoUser_v99', JSON.stringify(saved));
                } catch(e) {}
            }
        };

        // --- AFK / SESSION TIMEOUT LOGIC ---
        const AFK_LIMIT_MS = 25 * 60 * 1000; 
        const SESSION_LIMIT_MS = 60 * 60 * 1000; 

        const updateSessionActivity = () => {
            if (page.value === 'login' || isLocked.value) return;
            
            const savedUserStr = localStorage.getItem('cytoUser_v99');
            if (savedUserStr) {
                try {
                    const savedUser = JSON.parse(savedUserStr);
                    savedUser.lastActive = Date.now();
                    localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                } catch(e) {}
            }
        };

        const resetAfkTimer = () => {
            if (page.value === 'login') return;

            if (!isLocked.value) {
                updateSessionActivity(); 
                clearTimeout(afkTimeout);
                afkTimeout = setTimeout(() => { lockScreen(); }, AFK_LIMIT_MS); 
            }
        };

        const startSessionMonitor = () => {
            if (sessionCheckInterval) clearInterval(sessionCheckInterval);
            
            sessionCheckInterval = setInterval(() => {
                if (page.value === 'login') return;

                const savedUserStr = localStorage.getItem('cytoUser_v99');
                if (savedUserStr) {
                    try {
                        const savedUser = JSON.parse(savedUserStr);
                        const lastActive = savedUser.lastActive || 0;
                        const timeElapsed = Date.now() - lastActive;

                        if (timeElapsed > SESSION_LIMIT_MS) {
                            frontendLog("Auto Logout", "Session expired due to inactivity", user.username);
                            forceLogout(true); 
                        }
                    } catch(e) {}
                }
            }, 60000); 
        };

        const lockScreen = () => {
            if (page.value === 'login') return;
            isLocked.value = true;
            lockPassword.value = '';
            lockError.value = '';
            clearTimeout(afkTimeout);

            const savedUserStr = localStorage.getItem('cytoUser_v99');
            if (savedUserStr) {
                try {
                    const savedUser = JSON.parse(savedUserStr);
                    savedUser.isLocked = true; 
                    savedUser.lastActive = Date.now(); 
                    localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                } catch(e) {}
            }
        };

        const unlockScreen = async () => {
            if (!lockPassword.value) return;
            isLoading.value = true;
            lockError.value = '';
            try {
                const res = await runGas('apiVerifyPassword', user.username, lockPassword.value);
                if (res.status === 'success') {
                    isLocked.value = false;
                    
                    const savedUserStr = localStorage.getItem('cytoUser_v99');
                    if (savedUserStr) {
                        try {
                            const savedUser = JSON.parse(savedUserStr);
                            savedUser.isLocked = false; 
                            savedUser.lastActive = Date.now(); 
                            localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                        } catch(e) {}
                    }
                    resetAfkTimer();
                } else {
                    lockError.value = 'รหัสผ่านผิดพลาด ระบบกำลังออกจากระบบ...';
                    setTimeout(() => { forceLogout(); }, 1500);
                }
            } catch (e) {
                lockError.value = 'เกิดข้อผิดพลาดในการยืนยันตัวตน';
            } finally {
                isLoading.value = false;
            }
        };

        const handleCancelUnlock = () => {
            frontendLog("Cancel Unlock", "User canceled screen unlock and chose to logout", user.username);
            forceLogout();
        };

        const handleMainScroll = (e) => {};
        const handleTableScroll = (e) => {
            if (page.value === 'statistics') {
                const scrollTop = e.target.scrollTop;
                if (scrollTop > 5 && isDashboardTopOpen.value) {
                    isDashboardTopOpen.value = false; 
                } 
                else if (scrollTop <= 0 && !isDashboardTopOpen.value) {
                    isDashboardTopOpen.value = true; 
                }
            }
        };

        const progressPercent = computed(() => {
            return stats.total === 0 ? 0 : Math.round((stats.reported / stats.total) * 100);
        });

        const canAccessReport = computed(() => {
            if (!user.position && !user.role) return false;
            if (user.role === 'Admin') return true;
            const pos = user.position || '';
            return pos.includes('นักเทคนิคการแพทย์') || pos.includes('นักวิทยาศาสตร์การแพทย์') || pos.includes('พยาธิแพทย์');
        });

        const canViewReportDoc = computed(() => {
            if (!user.position && !user.role) return false;
            if (user.role === 'Admin') return true;
            const pos = user.position || '';
            return pos.includes('นักเทคนิคการแพทย์') || pos.includes('นักวิทยาศาสตร์การแพทย์') || pos.includes('พยาธิแพทย์');
        });
        
        const tatOverview = computed(() => {
            let onTime = 0; 
            let late = 0; 
            let totalWithRecDate = 0;
            
            (patients.value || []).forEach(p => {
                if (p.recDate) {
                    const tatData = getTAT(p);
                    totalWithRecDate++;
                    if (tatData.days <= 14) {
                        onTime++; 
                    } else {
                        late++;
                    }
                }
            });
            
            return {
                onTime: onTime,
                late: late,
                total: totalWithRecDate,
                percentOnTime: totalWithRecDate === 0 ? 0 : Math.round((onTime/totalWithRecDate)*100)
            };
        });

        const unitStats = computed(() => {
            const map = {};
            (patients.value || []).forEach(p => {
                if(!map[p.unit]) {
                    map[p.unit] = { name: p.unit, total: 0, reported: 0 };
                }
                map[p.unit].total++;
                if(p.status === 'Reported') {
                    map[p.unit].reported++;
                }
            });
            return Object.values(map).sort((a,b) => b.total - a.total);
        });

        const methodStats = computed(() => {
            const map = {};
            (patients.value || []).forEach(p => {
                const m = p.method || 'ไม่ระบุ';
                if(!map[m]) map[m] = { name: m, total: 0, reported: 0 };
                map[m].total++;
                if(p.status === 'Reported') map[m].reported++;
            });
            return Object.values(map).sort((a,b) => b.total - a.total);
        });

        const squamousDetailOptions = computed(() => {
            if (!formReport.squamousMain) return [];
            const filtered = masterSquamous.value.filter(x => x.main === formReport.squamousMain && x.detail1);
            return [...new Set(filtered.map(x => x.detail1))];
        });

        const squamousSubDetailOptions = computed(() => {
            if (formReport.squamousSubSingle !== '241 SIL') return [];
            const filtered = masterSquamous.value.filter(x => x.detail1 === '241 SIL' && x.detail2);
            return [...new Set(filtered.map(x => x.detail2))];
        });

        const glandularDetailOptions = computed(() => {
            if (!formReport.glandularMain || formReport.glandularMain === '281 Endocervical adenocarcinoma in situ (AIS)') return [];
            const filtered = masterGlandular.value.filter(x => x.main === formReport.glandularMain && x.detail1);
            return [...new Set(filtered.map(x => x.detail1))];
        });

        const closeAllDropdowns = () => { 
            ui.showContraList = false; 
            ui.showPrevTxList = false; 
            ui.showOrganismList = false; 
            ui.showNonNeoList = false;
        };

        const selectContra = (val) => { 
            ui.searchContra = val; 
            ui.showContraList = false; 
        };

        const togglePrevTx = (item) => { 
            const idx = ui.prevTxSelections.indexOf(item); 
            if (idx > -1) {
                ui.prevTxSelections.splice(idx, 1); 
            } else {
                ui.prevTxSelections.push(item); 
            }
        };
        
        const toggleOrganism = (item) => { 
            const idx = formReport.organismSelections.indexOf(item); 
            if (idx > -1) {
                formReport.organismSelections.splice(idx, 1); 
            } else {
                formReport.organismSelections.push(item); 
            }
        };

        const toggleNonNeo = (item) => { 
            const idx = formReport.nonNeoSelections.indexOf(item); 
            if (idx > -1) {
                formReport.nonNeoSelections.splice(idx, 1); 
            } else {
                formReport.nonNeoSelections.push(item); 
            }
        };

        const getMethodColor = (val) => {
            if (!masterSpecimenType.value) return 'text-slate-500 font-bold';
            const idx = masterSpecimenType.value.indexOf(val);
            if (idx === 0) return 'text-slate-600 bg-slate-100 px-2.5 py-1 rounded-md text-sm border theme-border font-bold';
            if (idx === 1) return 'text-indigo-600 bg-indigo-50 border border-indigo-200 px-2.5 py-1 rounded-md text-sm font-bold';
            if (idx === 2) return 'text-emerald-600 bg-emerald-50 border border-emerald-200 px-2.5 py-1 rounded-md text-sm font-bold';
            return 'text-slate-500 font-bold';
        };

        const getMethodTextColor = (val) => {
            if (!masterSpecimenType.value) return 'text-slate-700';
            const idx = masterSpecimenType.value.indexOf(val);
            if (idx === 0) return 'text-slate-700';
            if (idx === 1) return 'text-indigo-700';
            if (idx === 2) return 'text-emerald-700';
            return 'text-slate-700';
        };

        const getMethodColorStyle = (val) => {
            if (!masterSpecimenType.value) return { color: '#334155' };
            const idx = masterSpecimenType.value.indexOf(val);
            if (idx === 1) return { color: '#4338ca' }; 
            if (idx === 2) return { color: '#047857' }; 
            return { color: '#334155' }; 
        };

        watch(() => formReg.prefix, (newVal) => {
            const found = prefixesData.value.find(p => p.prefix === newVal);
            if (found && found.sex) {
                formReg.sex = found.sex;
            } else {
                formReg.sex = 'หญิง'; 
            }
        });

        const formatNoCode = (str) => {
            if (!str) return '';
            return str.replace(/^\d{3}\s*(?:-\s*)?/, '').trim();
        };

        const formatOrganisms = (selections, otherText) => {
            if(!selections) return '';
            return selections.map(s => {
                if(s === '109 Other organism' || s.includes('Other organism')) {
                    return 'Other organism : ' + otherText;
                }
                return formatNoCode(s);
            }).join(', ');
        };

        const formatCommentPdf = (commentStr) => {
            if (!commentStr) return '-';
            if (commentStr.startsWith('Other : ')) return commentStr.replace('Other : ', '');
            return commentStr;
        };

        const hospitalLogoUrl = 'https://drive.google.com/thumbnail?id=1OYPsStfO6aYigu6ChIbiYTu4pwqMlXMA&sz=w400';
        const hospitalLogoBase64 = ref('');
        let isFetchingLogo = false;
        
        const fetchHospitalLogo = async () => {
            if (hospitalLogoBase64.value || isFetchingLogo) return; 
            isFetchingLogo = true;
            try {
                const url = hospitalLogoUrl;
                const proxy1 = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                const proxy2 = 'https://corsproxy.io/?' + encodeURIComponent(url);
                
                let res = await fetch(proxy1).catch(() => null);
                if (!res || !res.ok) {
                    res = await fetch(proxy2).catch(() => null);
                }
                
                if (res && res.ok) {
                    const blob = await res.blob();
                    const reader = new FileReader();
                    reader.onloadend = () => { 
                        hospitalLogoBase64.value = reader.result; 
                    };
                    reader.readAsDataURL(blob);
                }
            } catch (e) {
                console.warn("Failed to fetch Hospital Logo as Base64:", e);
            } finally {
                isFetchingLogo = false;
            }
        };

        // --- MPI (MASTER PATIENT INDEX) LOGIC ---
        
        // Helper: ดึงเฉพาะตัวเลขจาก Cyto No (เช่น 690001 -> 690001) เพื่อใช้ในการเทียบใหม่-เก่า (Sorting)
        const parseCytoNo = (cytoNoStr) => {
            if (!cytoNoStr) return 0;
            return parseInt(cytoNoStr.replace(/\D/g, '')) || 0;
        };
        
        const fetchPatientHistorySilent = async (patientObjOrCid) => {
            // รับค่าเผื่อเป็น Object หรือ String ก็ทำงานได้
            let cid = typeof patientObjOrCid === 'object' ? patientObjOrCid.cid : patientObjOrCid;
            let currentCyto = typeof patientObjOrCid === 'object' ? parseCytoNo(patientObjOrCid.cytoNo) : (currentReportOriginalData.value ? parseCytoNo(currentReportOriginalData.value.cytoNo) : 999999999);

            if (!cid) return;
            isHistoryPreloading.value = true;
            try {
                const res = await runGas('apiGetPatientHistory', cid, user.username);
                if (res && res.status === 'success') {
                    let historyList = res.data || [];
                    
                    // ป้องกันการนำประวัติที่ "ใหม่กว่า" ปัจจุบันมาแสดง
                    historyList = historyList.filter(h => parseCytoNo(h.cytoNo) <= currentCyto);
                    
                    // บังคับเรียงใหม่สุด -> เก่าสุด (เลข Cyto มาก -> น้อย) เพื่อให้แสดงผลจากซ้ายไปขวา
                    patientHistoryData.value = historyList.sort((a, b) => parseCytoNo(b.cytoNo) - parseCytoNo(a.cytoNo));
                }
            } catch (e) {
                console.error("Silent history fetch error:", e);
            } finally {
                isHistoryPreloading.value = false;
            }
        };

        const fetchPatientHistory = async (patientObjOrCid) => {
            let cid = typeof patientObjOrCid === 'object' ? patientObjOrCid.cid : patientObjOrCid;
            let currentCyto = typeof patientObjOrCid === 'object' ? parseCytoNo(patientObjOrCid.cytoNo) : (currentReportOriginalData.value ? parseCytoNo(currentReportOriginalData.value.cytoNo) : 999999999);

            if (!cid || String(cid).trim() === '') {
                if(typeof Swal !== 'undefined') Swal.fire('ไม่พบข้อมูล', 'ผู้ป่วยรายนี้ไม่มีเลขประจำตัวประชาชน (CID) ในระบบ', 'warning');
                return;
            }
            if (isHistoryPreloading.value || isHistoryLoading.value) return; 

            historySearchCid.value = cid;
            showHistoryModal.value = true;
            
            // หากมีข้อมูลเดิมที่ตรงกันอยู่แล้ว ข้ามการโหลดซ้ำ
            if (patientHistoryData.value.length > 0 && patientHistoryData.value[0].cid === cid) {
                 return;
            }

            isHistoryLoading.value = true;
            try {
                const res = await runGas('apiGetPatientHistory', cid, user.username);
                if (res && res.status === 'success') {
                    let historyList = res.data || [];
                    
                    // ป้องกันการนำประวัติที่ "ใหม่กว่า" ปัจจุบันมาแสดง
                    historyList = historyList.filter(h => parseCytoNo(h.cytoNo) <= currentCyto);

        const getTAT = (p) => {
            if (!p.recDate) return { days: 0, percent: 0, colorClass: 'bg-slate-300', statusText: 'รอข้อมูล' };
            const start = new Date(p.recDate);
            let end = new Date(); 
            
            if (p.status === 'Reported') {
                const reportDTStr = p.pathoDateTime ? p.pathoDateTime : p.cytoDateTime;
                const parsed = parseDateTimeString(reportDTStr);
                if(parsed.date) end = new Date(parsed.date);
            }
            
            start.setHours(0,0,0,0); 
            end.setHours(0,0,0,0);
            
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let percent = (diffDays / 14) * 100;
            if (percent > 100) percent = 100;
            
            let colorClass = 'bg-gradient-to-r from-emerald-400 via-emerald-200 to-emerald-400'; 
            if (diffDays >= 8 && diffDays <= 12) colorClass = 'bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-400'; 
            if (diffDays >= 13) colorClass = 'bg-gradient-to-r from-rose-500 via-red-300 to-rose-500'; 
            
            const dayText = diffDays <= 1 ? 'Day' : 'Days';
            
            return {
                days: diffDays,
                percent: percent,
                colorClass: colorClass,
                statusText: `${diffDays} ${dayText}`
            };
        };

                                    coordinator: formReg.coordinator, 
                                    phone: formReg.phone 
                                };
                                openRegisterPage(); 
                                Object.assign(formReg, stickyData);
                                fetchData(); 
                                
                                const mainEl = document.querySelector('main'); 
                                if(mainEl) mainEl.scrollTop = 0;
                            }
                        });
                    } else { 
                        Swal.fire('Error', res.message, 'error'); 
                    }
                } catch (err) {
                    console.error(err);
                } finally { 
                    isLoading.value = false; 
                }
            }
        };

        const openReportList = () => { 
            page.value = 'report_list'; 
            ui.reportSearch = ''; 
            unitFilter.value = 'All'; 
        };

        const parseDateTimeString = (dtStr) => {
            if (!dtStr) return { date: '', time: '' };
            try {
                if (dtStr.includes('GMT') || dtStr.includes('Z')) {
                    const d = new Date(dtStr);
                    if (!isNaN(d)) {
                        const pad = (n) => String(n).padStart(2, '0');
                        return { date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`, time: `${pad(d.getHours())}:${pad(d.getMinutes())}` };
                    }
                }
                const parts = dtStr.split(', ');
                if (parts.length !== 2) return { date: '', time: '' };
                const [dPart, tPart] = parts;
                const dateParts = dPart.split('/');
                if (dateParts.length !== 3) return { date: '', time: '' };
                const [day, month, year] = dateParts;
                const dateStr = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
                const timeStr = tPart.substring(0, 5);
                return { date: dateStr, time: timeStr };
            } catch(e) { return { date: '', time: '' }; }
        };

        const formatSignatureDate = (dateVal, timeVal) => {
            if (!dateVal || !timeVal) return "";
            const [year, month, day] = dateVal.split('-');
            return `${parseInt(day)}/${parseInt(month)}/${year}, ${timeVal}:00`;
        };

        const populateReportForm = (patient) => {
            formReport.rowId = patient.rowId; 
            formReport.cytoNo = patient.cytoNo; 
            formReport.patient = patient;
            
            formReport.adequacy = patient.adequacy || ''; 
            formReport.adequacyDetail = patient.adequacyDetail || '';
            
            if (patient.additional && patient.additional.startsWith('029 Other - ')) { 
                formReport.additional = '029 Other'; 
                ui.reportAdditionalOther = patient.additional.replace('029 Other - ', ''); 
            } else { 
                formReport.additional = patient.additional || ''; 
                ui.reportAdditionalOther = ''; 
            }
            
            formReport.organismSelections = []; 
            formReport.organismOtherText = '';
            if (patient.organism) {
                const parts = patient.organism.split(',').map(s => s.trim());
                parts.forEach(p => {
                    if (p.startsWith('109 Other organism - ')) {
                        if(!formReport.organismSelections.includes('109 Other organism')) {
                            formReport.organismSelections.push('109 Other organism');
                        }
                        formReport.organismOtherText = p.replace('109 Other organism - ', '');
                    } else if (p === '109 Other organism') {
                        if(!formReport.organismSelections.includes('109 Other organism')) {
                            formReport.organismSelections.push('109 Other organism');
                        }
                    } else if (masterOrganism.value.includes(p)) {
                        if(!formReport.organismSelections.includes(p)) {
                            formReport.organismSelections.push(p);
                        }
                    } else {
                        if(!formReport.organismSelections.includes('109 Other organism')) {
                            formReport.organismSelections.push('109 Other organism');
                        }
                        formReport.organismOtherText = formReport.organismOtherText ? formReport.organismOtherText + ' ' + p : p;
                    }
                });
            }

            formReport.nonNeoSelections = [];
            if (patient.nonNeo) {
                const parts = patient.nonNeo.split(',').map(s => s.trim());
                parts.forEach(p => {
                    if (masterNonNeo.value.includes(p)) {
                        if(!formReport.nonNeoSelections.includes(p)) formReport.nonNeoSelections.push(p);
                    }
                });
            }
            
            formReport.squamousMain = patient.squamousMain || '';
            formReport.squamousSubSingle = ''; 
            formReport.vainOption = '';
            
            if (patient.squamousSub) {
                if (patient.squamousSub.startsWith('241 SIL - ')) {
                    formReport.squamousSubSingle = '241 SIL';
                    formReport.vainOption = patient.squamousSub.replace('241 SIL - ', '');
                } else {
                    const firstOption = patient.squamousSub.split(', ')[0];
                    formReport.squamousSubSingle = firstOption || '';
                }
            }

            formReport.glandularMain = patient.glandularMain || '';
            formReport.glandularSub = patient.glandularSub || '';

            formReport.cat300 = patient.cat300 || '';

            if (patient.comment && patient.comment.startsWith('Other : ')) {
                ui.commentSelect = 'Other';
                ui.commentOtherText = patient.comment.replace('Other : ', '');
            } else {
                ui.commentSelect = patient.comment || '';
                ui.commentOtherText = '';
            }

            if (patient.status === 'Reported' && patient.cytoName) {
                formReport.cytoName = patient.cytoName;
            } else {
                formReport.cytoName = ''; 
            }
            
            if (patient.cytoDateTime) {
                const parsed = parseDateTimeString(patient.cytoDateTime);
                formReport.cytoDate = parsed.date;
                formReport.cytoTime = parsed.time;
            } else {
                const now = new Date();
                formReport.cytoDate = now.toISOString().split('T')[0];
                formReport.cytoTime = now.toTimeString().substring(0, 5);
            }

            formReport.hasPatho = !!patient.pathoName;
            formReport.pathoName = patient.pathoName || '';
            
            if (patient.pathoDateTime) {
                const parsed = parseDateTimeString(patient.pathoDateTime);
                formReport.pathoDate = parsed.date;
                formReport.pathoTime = parsed.time;
            } else {
                formReport.pathoDate = '';
                formReport.pathoTime = '';
            }
        };

        const openReportForm = (patient, isViewOnly = false) => {
            viewMode.value = isViewOnly;
            currentReportOriginalData.value = JSON.parse(JSON.stringify(patient)); 
            populateReportForm(patient);
            page.value = 'report_form';
            
            if (patient.cid && patient.cid.trim() !== '') {
                fetchPatientHistorySilent(patient);
            }
        };

        const openReportPreview = (patient) => {
            currentReportOriginalData.value = JSON.parse(JSON.stringify(patient)); 
            isViewingHistory.value = false;
            selectedHistoricalReport.value = 'current';
            patientHistoryData.value = []; 
            
            populateReportForm(patient);
            page.value = 'report_preview';

            if (patient.cid && patient.cid.trim() !== '') {
                fetchPatientHistorySilent(patient);
            }
        };

        const submitReport = async () => {
            if (viewMode.value) return;

            if(typeof Swal === 'undefined') return;
            const confirm = await Swal.fire({
                title: 'ยืนยันบันทึกผล?',
                text: 'คุณต้องการบันทึกผลรายงานเซลล์วิทยาใช่หรือไม่?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                confirmButtonColor: '#10b981'
            });

            if (confirm.isConfirmed) {
                isLoading.value = true;
                try {
                    const payload = {
                        rowId: formReport.rowId,
                        isEdit: formReport.patient.status === 'Reported',
                        adequacy: formReport.adequacy,
                        adequacyDetail: formReport.adequacyDetail,
                        additional: formReport.additional === '029 Other' ? ('029 Other - ' + ui.reportAdditionalOther) : formReport.additional,
                        
                        organism: formReport.organismSelections.map(s => {
                            if (s === '109 Other organism') return '109 Other organism - ' + formReport.organismOtherText;
                            return s;
                        }).join(', '),
                        
                        nonNeo: formReport.nonNeoSelections.join(', '),
                        
                        squamousMain: formReport.squamousMain,
                        squamousSub: formReport.squamousSubSingle === '241 SIL' ? ('241 SIL - ' + formReport.vainOption) : formReport.squamousSubSingle,
                        
                        glandularMain: formReport.glandularMain,
                        glandularSub: formReport.glandularSub,
                        
                        cat300: formReport.cat300,
                        
                        comment: ui.commentSelect === 'Other' ? ('Other : ' + ui.commentOtherText) : ui.commentSelect,
                        
                        cytoName: formReport.cytoName,
                        cytoDateTime: formatSignatureDate(formReport.cytoDate, formReport.cytoTime),
                        
                        pathoName: formReport.hasPatho ? formReport.pathoName : '',
                        pathoDateTime: formReport.hasPatho ? formatSignatureDate(formReport.pathoDate, formReport.pathoTime) : ''
                    };

                    const res = await runGas('apiSubmitReport', payload, config.selectedYear, user.username);
                    
                    if (res && res.status === 'success') {
                        Swal.fire({
                            icon: 'success',
                            title: 'บันทึกผลสำเร็จ',
                            text: 'บันทึกผลการตรวจ Cytology No: ' + formReport.cytoNo,
                            confirmButtonText: 'ตกลง'
                        }).then(() => {
                            page.value = 'report_list';
                            fetchData();
                        });
                    } else {
                        Swal.fire('Error', res.message, 'error');
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    isLoading.value = false;
                }
            }
        };

        const executePrint = () => {
            frontendLog("Initiated Print / PDF", "User opened print dialog for report: " + formReport.cytoNo, user.username);
            window.print();
        };

        const generatePdfFilename = () => {
            if (!formReport.patient || !formReport.cytoNo) return 'Cyto_Report.pdf';
            return `Cyto_Report_${formReport.cytoNo}_${formReport.patient.fname}.pdf`;
        };

        const getPrintDateTime = () => {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return `${pad(now.getDate())}/${pad(now.getMonth() + 1)}/${now.getFullYear()}, ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        };

        const openChangePassword = async () => {
            const { value: formValues } = await Swal.fire({
                title: 'เปลี่ยนรหัสผ่าน',
                html:
                    '<input id="swal-input1" class="swal2-input" type="password" placeholder="รหัสผ่านใหม่">' +
                    '<input id="swal-input2" class="swal2-input" type="password" placeholder="ยืนยันรหัสผ่านใหม่">',
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                preConfirm: () => {
                    const p1 = document.getElementById('swal-input1').value;
                    const p2 = document.getElementById('swal-input2').value;
                    if (!p1 || !p2) {
                        Swal.showValidationMessage('กรุณากรอกรหัสให้ครบถ้วน');
                        return false;
                    }
                    if (p1 !== p2) {
                        Swal.showValidationMessage('รหัสผ่านไม่ตรงกัน');
                        return false;
                    }
                    return p1;
                }
            });

            if (formValues) {
                isLoading.value = true;
                try {
                    const res = await runGas('apiChangePassword', user.username, formValues);
                    if(res.status === 'success') {
                        Swal.fire('สำเร็จ', 'เปลี่ยนรหัสผ่านเรียบร้อย', 'success');
                    } else {
                        Swal.fire('ข้อผิดพลาด', res.message, 'error');
                    }
                } catch(e) {
                    Swal.fire('ข้อผิดพลาด', e.message, 'error');
                } finally {
                    isLoading.value = false;
                }
            }
        };

        const handleImageUpload = (event, type) => {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 2 * 1024 * 1024) {
                Swal.fire('ไฟล์ใหญ่เกินไป', 'กรุณาอัปโหลดรูปภาพขนาดไม่เกิน 2MB', 'warning');
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result;
                isLoading.value = true;
                try {
                    if (type === 'profile') {
                        const res = await runGas('apiSaveProfileImage', user.username, base64Data);
                        if(res.status === 'success') {
                            user.image = res.url;
                            const savedUserStr = localStorage.getItem('cytoUser_v99');
                            if (savedUserStr) {
                                const savedUser = JSON.parse(savedUserStr);
                                savedUser.user.image = res.url;
                                localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                            }
                            Swal.fire('สำเร็จ', 'อัปเดตรูปโปรไฟล์เรียบร้อย', 'success');
                        }
                    } else if (type === 'logo') {
                        const res = await runGas('apiSaveSystemLogo', base64Data, user.username);
                        if(res.status === 'success') {
                            systemConfig.logoUrl = res.url;
                            const savedUserStr = localStorage.getItem('cytoUser_v99');
                            if (savedUserStr) {
                                const savedUser = JSON.parse(savedUserStr);
                                savedUser.systemLogo = res.url;
                                localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                            }
                            showSettingsModal.value = false;
                            Swal.fire('สำเร็จ', 'อัปเดตโลโก้ระบบเรียบร้อย', 'success');
                        }
                    }
                } catch(err) {
                    Swal.fire('ข้อผิดพลาด', err.message, 'error');
                } finally {
                    isLoading.value = false;
                    event.target.value = '';
                }
            };
            reader.readAsDataURL(file);
        };

        return {
            appVersion, page, loginStep, formLogin, otpInput, otpMessage, otpCooldown,
            isLocked, lockPassword, lockError, unlockScreen, handleCancelUnlock,
            isLoading, isDataLoading, isSpinning, isEditMode, viewMode, isSidebarOpen, isDashboardTopOpen,
            theme, changeTheme, showSettingsModal, showProfileModal,
            
            showHistoryModal, isHistoryLoading, isHistoryPreloading, patientHistoryData, historySearchCid, 
            selectedHistoricalReport, isViewingHistory, fetchPatientHistory, viewHistoricalReport,

            user, systemConfig, config, stats,
            unitFilter, statusFilter, dashDateStart, dashDateEnd, searchQuery, filteredPatients, filteredReportPatients,
            masterUnits, masterDistricts, masterAdequacy, masterCytoTechs, masterPathos,
            masterOrganism, masterNonNeo, masterContras, masterPrevTx, masterSpecimenType, masterComment, prefixes,
            formReg, ui, formReport,
            handleLoginStep1, handleLoginStep2, handleResendOtp, handleCancelLogin, handleLogout, lockScreen,
            fetchData, openRegisterPage, openEditMode, openViewMode, submitRegister,
            openReportList, openReportForm, openReportPreview, submitReport,
            adequacyDetailOptions, additionalOptions, squamousDetailOptions, squamousSubDetailOptions, glandularDetailOptions,
            hasData100, hasData200Sq, hasData200Gl, hasData300, hasDataComment,
            closeAllDropdowns, selectContra, togglePrevTx, toggleOrganism, toggleNonNeo,
            formatNoCode, formatOrganisms, formatCommentPdf, getMethodColor,
            progressPercent, canAccessReport, canViewReportDoc, tatOverview, unitStats, getTAT,
            executePrint, generatePdfFilename, getPrintDateTime, hospitalLogoBase64, hospitalLogoUrl,
            logoRef, toggleLogo, isLogoPlaying, handleTableScroll, handleMainScroll,
            openChangePassword, handleImageUpload, masterSquamous, masterGlandular, masterCat300,
            methodStats, getMethodTextColor, getMethodColorStyle, historicalOptions, formatDisplayDate
        };
    }
});

app.mount('#app');
</script>
